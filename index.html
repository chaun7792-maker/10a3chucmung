<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Bất Ngờ</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); font-family: 'Arial', sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        
        /* --- EDITOR --- */
        #editor { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: #333; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .ed-box { max-width: 500px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        .ed-box input, .ed-box textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }

        /* --- GIAO DIỆN CHÍNH --- */
        #main-ui { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
        #init-mail { font-size: 100px; cursor: pointer; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Hiệu ứng rơi */
        .fall-item { position: absolute; color: #FFD700; font-weight: bold; text-shadow: 0 0 10px #000; z-index: 5; white-space: nowrap; }
        .fall-img { position: absolute; width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; z-index: 5; }

        /* Thư khổng lồ */
        #huge-mail { display: none; font-size: 200px; position: absolute; top: -300px; transition: 2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; z-index: 20; }
        #huge-mail.show { top: 20%; }

        /* Bức thư bên trong */
        #letter-content { display: none; position: absolute; width: 80%; max-width: 400px; background: #fff5f5; color: #333; padding: 30px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; text-align: center; transform: scale(0); transition: 0.5s; }
        #letter-content.open { transform: scale(1); }

        /* Nhân vật Chibi & Băng rôn */
        #chibi-zone { display: none; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; text-align: center; z-index: 150; }
        #chibi-hero { font-size: 80px; transition: 1s; }
        #banner { width: 250px; background: #e74c3c; color: white; padding: 15px; border-radius: 0 0 10px 10px; font-weight: bold; border: 3px solid #f1c40f; transform: translateY(-100%); transition: 1.5s; }
        
        /* Bó hoa Tulip */
        #tulip-wrap { display: none; position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%) scale(0.1); z-index: 200; transition: 2s; }
        #tulip-wrap.bloom { display: block; transform: translateX(-50%) scale(10); opacity: 0; }
        #tulip-img { font-size: 50px; }
    </style>
</head>
<body>

    <audio id="music" loop></audio>
    <canvas id="sky"></canvas>

    <div id="editor">
        <div class="ed-box">
            <h2>⚙️ Cài đặt thiệp</h2>
            <label>Danh sách tên (cách nhau dấu phẩy):</label><input type="text" id="in-n">
            <label>Link ảnh (cách nhau dấu phẩy):</label><textarea id="in-i"></textarea>
            <label>Lời chúc trong thư:</label><textarea id="in-w"></textarea>
            <label>Chữ trên băng rôn:</label><input type="text" id="in-b">
            <label>Link nhạc (.mp3):</label><input type="text" id="in-m">
            <button class="btn-save" onclick="save()">LẤY LINK</button>
            <input type="text" id="out-l" readonly style="margin-top:20px; background:#eee">
        </div>
    </div>

    <div id="main-ui">
        <div id="init-mail" onclick="start()">✉️</div>
        <div id="huge-mail" onclick="openHuge()">📩</div>
        
        <div id="letter-content">
            <h3 style="color:#e74c3c">Gửi lời thương yêu!</h3>
            <p id="wish-txt"></p>
            <button onclick="nextPhase()" style="padding:10px; border:none; background:#3498db; color:white; border-radius:5px; cursor:pointer;">Tiếp tục</button>
        </div>

        <div id="chibi-zone">
            <div id="chibi-hero">🦸‍♂️</div>
            <div id="banner"></div>
        </div>

        <div id="tulip-wrap">
            <div id="tulip-img">🌷🌷🌷</div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const isEdit = p.get('edit') === 'true';
        const cfg = {
            n: p.get('n') || "Bạn A, Bạn B, Cả Lớp",
            i: p.get('i') || "",
            w: p.get('w') || "Chúc mọi người luôn hạnh phúc và rạng rỡ!",
            b: p.get('b') || "CHÚC MỪNG BẠN!",
            m: p.get('m') || "https://www.bensound.com/bensound-music/bensound-love.mp3"
        };

        if(isEdit) {
            document.getElementById('editor').style.display = 'block';
            document.getElementById('in-n').value = cfg.n;
            document.getElementById('in-i').value = cfg.i;
            document.getElementById('in-w').value = cfg.w;
            document.getElementById('in-b').value = cfg.b;
            document.getElementById('in-m').value = cfg.m;
        }

        function save() {
            const l = window.location.origin + window.location.pathname + `?n=${encodeURIComponent(document.getElementById('in-n').value)}&i=${encodeURIComponent(document.getElementById('in-i').value)}&w=${encodeURIComponent(document.getElementById('in-w').value)}&b=${encodeURIComponent(document.getElementById('in-b').value)}&m=${encodeURIComponent(document.getElementById('in-m').value)}`;
            document.getElementById('out-l').value = l;
        }

        // --- NỀN TRỜI SAO XANH & SAO BĂNG ---
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initSky() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, s: Math.random()});
        }
        function drawSky() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => {
                ctx.globalAlpha = Math.abs(Math.sin(Date.now()*0.001 + s.s*10));
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawSky);
        }

        function shootStar() {
            for(let i=0; i<3; i++) { // 3 cái bay qua
                setTimeout(() => {
                    let x = Math.random()*canvas.width, y = 0;
                    let iv = setInterval(() => {
                        ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth=2;
                        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-80, y+80); ctx.stroke();
                        x-=12; y+=12; if(y>canvas.height) clearInterval(iv);
                    }, 20);
                }, i * 2000);
            }
        }

        // --- LUỒNG CHÍNH ---
        function start() {
            document.getElementById('music').src = cfg.m;
            document.getElementById('music').play();
            document.getElementById('init-mail').style.display = 'none';
            initSky(); drawSky(); shootStar();
            
            const items = [...cfg.n.split(','), ...cfg.i.split(',').filter(v=>v)];
            let idx = 0;
            let iv = setInterval(() => {
                if(idx >= items.length) {
                    clearInterval(iv);
                    setTimeout(() => { 
                        let h = document.getElementById('huge-mail');
                        h.style.display = 'block'; setTimeout(()=>h.classList.add('show'), 100);
                    }, 3000);
                    return;
                }
                let val = items[idx++].trim();
                let el = document.createElement(val.startsWith('http') ? 'img' : 'div');
                el.className = val.startsWith('http') ? 'fall-img' : 'fall-item';
                if(val.startsWith('http')) el.src = val; else el.innerText = val;
                el.style.left = Math.random()*80+10+'%';
                document.body.appendChild(el);
                el.animate([{top:'-100px'}, {top:'110vh'}], {duration: 6000}).onfinish = () => el.remove();
            }, 800);
        }

        function openHuge() {
            document.getElementById('huge-mail').style.display = 'none';
            let content = document.getElementById('letter-content');
            content.style.display = 'block';
            setTimeout(() => {
                content.classList.add('open');
                document.getElementById('wish-txt').innerText = cfg.w;
            }, 100);
        }

        function nextPhase() {
            document.getElementById('letter-content').style.display = 'none';
            document.getElementById('chibi-zone').style.display = 'block';
            setTimeout(() => {
                document.getElementById('banner').style.transform = 'translateY(0)';
                document.getElementById('banner').innerText = cfg.b;
                setTimeout(() => {
                    // Siêu nhân giơ hoa
                    document.getElementById('chibi-hero').innerText = "🦸‍♂️💐";
                    setTimeout(() => {
                        let tulip = document.getElementById('tulip-wrap');
                        tulip.style.display = 'block';
                        setTimeout(() => tulip.classList.add('bloom'), 100);
                    }, 1000);
                }, 2000);
            }, 500);
        }
    </script>
</body>
</html>
